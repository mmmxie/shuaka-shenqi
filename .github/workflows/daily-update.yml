name: 每日卡片資料核查

on:
  schedule:
    # 台灣時間每日 00:00（UTC+8）= UTC 16:00
    - cron: '0 16 * * *'
  workflow_dispatch:        # 允許手動觸發

permissions:
  contents: write           # 讓 Action 能 commit + push

jobs:
  daily-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: 安裝 Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安裝 Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: 執行每日資料核查
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: bash ci/daily_update.sh

      - name: Commit & push 變更
        run: |
          git config user.name "shuaka-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "無變更，略過 commit"
          else
            git commit -m "每日自動更新 $(date '+%Y-%m-%d')"
            git push
          fi
